version: "3"

services:
  github-runner:
    image: myoung34/github-runner:ubuntu-latest
    deploy:
      replicas: 2
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      RUNNER_WORKDIR: "/tmp/runner/work"
      RUNNER_LABELS: "selfhosted"
      RUNNER_SCOPE: "repo"
      REPO_URL: "https://github.com/christiangroth/${GH_REPO}"
      EPHEMERAL: "true"
      DISABLE_AUTO_UPDATE: "true"
      ACCESS_TOKEN: "${GH_ACCESS_TOKEN}"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/etc/timezone:/etc/timezone:ro"
      - "/etc/localtime:/etc/localtime:ro"
